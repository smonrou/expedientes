spring.application.name=expedientes
spring.datasource.url=jdbc:mysql://localhost:3306/cunori_expedientes?useSSL=false&serverTimezone=America/Guatemala&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=8080

app.jwt.secret=clave-secreta-local-cambiar-en-produccion-debe-tener-al-menos-256-bits
app.jwt.expiration-ms=86400000